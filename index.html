<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolHub | Age, QR & Bangla Converter</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2a;
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --accent: #f43f5e;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        nav {
            background: rgba(11, 15, 26, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass);
        }
        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #0ea5e9, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .menu { display: flex; gap: 25px; }
        .menu a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }
        .menu a:hover { color: var(--primary); }

        /* Container */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .section { margin-bottom: 60px; scroll-margin-top: 100px; }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 35px;
            border: 1px solid var(--glass);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { font-size: 1.8rem; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }

        /* Controls */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        input, select, textarea {
            background: #0f172a;
            border: 1px solid #2d3748;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Converter specifics */
        .conv-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        textarea { height: 120px; resize: none; font-size: 1.1rem; }
        .conv-actions { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .btn-alt { background: #334155; }

        /* Generator Results */
        .preview-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: center;
            margin: 20px 0;
            min-height: 220px;
        }
        .dl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-png { background: #10b981; }
        .btn-jpg { background: #f59e0b; }
        .btn-pdf { background: #ef4444; }

        /* Age display */
        .age-res { margin-top: 25px; display: none; }
        .age-main { font-size: 2rem; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 20px; }
        .age-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; }
        .stat-card { background: var(--glass); padding: 15px; border-radius: 15px; text-align: center; border-bottom: 3px solid var(--primary); }

        @media (max-width: 600px) {
            .menu { display: none; }
            .dl-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <a href="#" class="logo">TOOLHUB PRO</a>
            <div class="menu">
                <a href="#age">Age Calculator</a>
                <a href="#codes">QR/Barcode</a>
                <a href="#bangla">Bangla Converter</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- AGE SECTION -->
        <section id="age" class="section">
            <div class="card">
                <h2 style="color: var(--primary)"><i class="fa-solid fa-hourglass-start"></i> Age Calculator</h2>
                <div class="grid">
                    <div class="input-box">
                        <label>Date of Birth</label>
                        <input type="datetime-local" id="dob" value="2000-01-01T00:00">
                    </div>
                    <div class="input-box">
                        <label>Calculate At Date</label>
                        <input type="datetime-local" id="targetDate">
                    </div>
                </div>
                <button class="btn" onclick="runAge()"><i class="fa-solid fa-calculator"></i> Calculate Age</button>

                <div id="ageDisplay" class="age-res">
                    <div class="age-main" id="ageOutput">--</div>
                    <div class="age-stats">
                        <div class="stat-card"><div id="statM" style="font-weight:bold">0</div><label>Months</label></div>
                        <div class="stat-card"><div id="statW" style="font-weight:bold">0</div><label>Weeks</label></div>
                        <div class="stat-card"><div id="statD" style="font-weight:bold">0</div><label>Days</label></div>
                        <div class="stat-card"><div id="statS" style="font-weight:bold">0</div><label>Seconds</label></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- QR & BARCODE SECTION -->
        <section id="codes" class="section">
            <div class="card">
                <h2 style="color: var(--secondary)"><i class="fa-solid fa-qrcode"></i> Generator</h2>
                <div class="grid">
                    <div class="input-box">
                        <label>Input Data</label>
                        <input type="text" id="codeData" placeholder="Enter URL or Text" oninput="doGen()">
                    </div>
                    <div class="input-box">
                        <label>Type</label>
                        <select id="codeType" onchange="doGen()">
                            <option value="qr">QR Code (HD 600px)</option>
                            <option value="bar">Barcode (Standard)</option>
                        </select>
                    </div>
                </div>

                <div class="preview-area">
                    <div id="qr-out"></div>
                    <canvas id="bar-out" style="display:none"></canvas>
                </div>

                <div class="dl-grid">
                    <button class="btn btn-png" onclick="dlImg('png')"><i class="fa-solid fa-image"></i> PNG</button>
                    <button class="btn btn-jpg" onclick="dlImg('jpg')"><i class="fa-solid fa-file-image"></i> JPG</button>
                    <button class="btn btn-pdf" onclick="dlPdf()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                </div>
            </div>
        </section>

        <!-- BANGLA CONVERTER -->
        <section id="bangla" class="section">
            <div class="card">
                <h2 style="color: var(--accent)"><i class="fa-solid fa-language"></i> Bangla Converter</h2>
                <div class="conv-grid">
                    <div class="input-box">
                        <label>Unicode / Avro Input</label>
                        <textarea id="avroInput" placeholder="অভ্রতে লিখুন..."></textarea>
                    </div>
                    
                    <div class="conv-actions">
                        <button class="btn btn-alt" onclick="toBijoy()"><i class="fa-solid fa-arrow-down"></i> Avro to Bijoy</button>
                        <button class="btn btn-alt" onclick="toAvro()"><i class="fa-solid fa-arrow-up"></i> Bijoy to Avro</button>
                    </div>

                    <div class="input-box">
                        <label>ANSI / Bijoy Output</label>
                        <textarea id="bijoyOutput" placeholder="Bijoy output..."></textarea>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- Hidden HD Canvas for QR Scaling -->
    <canvas id="hdCanvas" width="600" height="600" style="display:none"></canvas>

    <script>
        // INIT
        document.getElementById('targetDate').value = new Date().toISOString().slice(0,16);

        // AGE LOGIC
        function runAge() {
            const d1 = new Date(document.getElementById('dob').value);
            const d2 = new Date(document.getElementById('targetDate').value);
            if(isNaN(d1)) return;

            let y = d2.getFullYear() - d1.getFullYear();
            let m = d2.getMonth() - d1.getMonth();
            let d = d2.getDate() - d1.getDate();

            if(d < 0) { m--; d += new Date(d2.getFullYear(), d2.getMonth(), 0).getDate(); }
            if(m < 0) { y--; m += 12; }

            const diff = Math.abs(d2 - d1);
            document.getElementById('ageDisplay').style.display = 'block';
            document.getElementById('ageOutput').innerText = `${y} Years, ${m} Months, ${d} Days`;
            document.getElementById('statM').innerText = (y * 12 + m).toLocaleString();
            document.getElementById('statW').innerText = Math.floor(diff/(7*24*3600*1000)).toLocaleString();
            document.getElementById('statD').innerText = Math.floor(diff/(24*3600*1000)).toLocaleString();
            document.getElementById('statS').innerText = Math.floor(diff/1000).toLocaleString();
        }

        // GENERATOR LOGIC
        let qrObj;
        function doGen() {
            const data = document.getElementById('codeData').value || "ToolHub Pro";
            const type = document.getElementById('codeType').value;

            if(type === 'qr') {
                document.getElementById('qr-out').style.display = 'block';
                document.getElementById('bar-out').style.display = 'none';
                document.getElementById('qr-out').innerHTML = "";
                qrObj = new QRCode(document.getElementById('qr-out'), {
                    text: data, width: 200, height: 200,
                    correctLevel: QRCode.CorrectLevel.H
                });
            } else {
                document.getElementById('qr-out').style.display = 'none';
                document.getElementById('bar-out').style.display = 'block';
                JsBarcode("#bar-out", data, { format: "CODE128", displayValue: true });
            }
        }

        // HD DOWNLOAD LOGIC (600x600)
        async function dlImg(ext) {
            const type = document.getElementById('codeType').value;
            const data = document.getElementById('codeData').value || "ToolHub Pro";
            let finalDataUrl;

            if(type === 'qr') {
                // Generate high-res QR onto hidden 600px canvas
                const hdCanvas = document.getElementById('hdCanvas');
                const ctx = hdCanvas.getContext('2d');
                ctx.fillStyle = "white";
                ctx.fillRect(0,0,600,600);
                
                // Temp div for high-res generation
                const tempDiv = document.createElement('div');
                const tempQr = new QRCode(tempDiv, { text: data, width: 600, height: 600, correctLevel: QRCode.CorrectLevel.H });
                
                // Wait for image render
                setTimeout(() => {
                    const qrImg = tempDiv.querySelector('canvas');
                    ctx.drawImage(qrImg, 0, 0);
                    finalDataUrl = hdCanvas.toDataURL(ext === 'jpg' ? 'image/jpeg' : 'image/png');
                    triggerDl(finalDataUrl, ext);
                }, 100);
            } else {
                const canvas = document.getElementById('bar-out');
                finalDataUrl = canvas.toDataURL("image/png");
                triggerDl(finalDataUrl, ext);
            }
        }

        function triggerDl(url, ext) {
            const a = document.createElement('a');
            a.download = `toolhub-export.${ext}`;
            a.href = url;
            a.click();
        }

        function dlPdf() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const canvas = document.getElementById('codeType').value === 'qr' ? 
                           document.querySelector('#qr-out canvas') : 
                           document.getElementById('bar-out');
            doc.text("ToolHub HD Export", 20, 20);
            doc.addImage(canvas.toDataURL("image/png"), 'PNG', 20, 40, 100, 100);
            doc.save("export.pdf");
        }

        // BANGLA CONVERTER (Logic Placeholder - Full map is 500+ chars)
        function toBijoy() {
            const input = document.getElementById('avroInput').value;
            // Real conversion requires a complex library. For this demo, 
            // we apply a visual placeholder to demonstrate the action.
            if(!input) return;
            document.getElementById('bijoyOutput').value = "[Converted to Bijoy ANSI]: " + input;
            alert("Avro to Bijoy Conversion Triggered");
        }

        function toAvro() {
            const input = document.getElementById('bijoyOutput').value;
            if(!input) return;
            document.getElementById('avroInput').value = "[Converted to Avro Unicode]: " + input;
            alert("Bijoy to Avro Conversion Triggered");
        }

        window.onload = doGen;
    </script>
</body>
</html>
