<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolHub Pro | All-in-One Utility</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #f472b6;
            --success: #10b981;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
        }

        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .menu { display: flex; gap: 20px; }
        .menu a { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .menu a:hover { color: var(--primary); }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .section { margin-bottom: 70px; scroll-margin-top: 100px; }
        .card {
            background: var(--card); border-radius: 24px; padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.05);
        }
        h2 { font-size: 1.8rem; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        
        input, select, textarea {
            background: #0f172a; border: 1px solid #334155; color: white;
            padding: 12px; border-radius: 12px; font-size: 1rem; width: 100%;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 12px 20px; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
            width: 100%;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:disabled { background: #334155; cursor: not-allowed; }

        .doc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .preview-box { background: white; padding: 20px; border-radius: 15px; display: flex; justify-content: center; margin: 20px 0; min-height: 50px; }
        
        .status { font-size: 0.85rem; margin-top: 10px; color: var(--primary); text-align: center; }

        @media (max-width: 600px) {
            .menu { display: none; }
            .doc-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="#" class="logo">TOOLHUB PRO</a>
            <div class="menu">
                <a href="#age">Age</a>
                <a href="#codes">QR/Bar</a>
                <a href="#docs">PDF/Word</a>
                <a href="#bangla">Bangla</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- PDF & DOCUMENT TOOLS -->
        <section id="docs" class="section">
            <div class="card">
                <h2 style="color: var(--success)"><i class="fa-solid fa-file-pdf"></i> PDF & Document Converter</h2>
                
                <div class="doc-grid">
                    <!-- Word to PDF -->
                    <div class="field">
                        <label>Word to PDF (.docx)</label>
                        <input type="file" id="wordInput" accept=".docx">
                        <button class="btn" onclick="convertWordToPdf()"><i class="fa-solid fa-file-export"></i> Convert to PDF</button>
                    </div>

                    <!-- PDF to Word -->
                    <div class="field">
                        <label>PDF to Word (Text Extraction)</label>
                        <input type="file" id="pdfToWordInput" accept=".pdf">
                        <button class="btn" onclick="convertPdfToWord()"><i class="fa-solid fa-file-word"></i> Convert to Word</button>
                    </div>

                    <!-- Image to PDF -->
                    <div class="field">
                        <label>Image to PDF (JPG/PNG)</label>
                        <input type="file" id="imgToPdfInput" accept="image/*" multiple>
                        <button class="btn" onclick="convertImgToPdf()"><i class="fa-solid fa-images"></i> Convert to PDF</button>
                    </div>

                    <!-- PDF to Image -->
                    <div class="field">
                        <label>PDF to Image</label>
                        <input type="file" id="pdfToImgInput" accept=".pdf">
                        <button class="btn" onclick="convertPdfToImg()"><i class="fa-solid fa-image"></i> Convert to JPG</button>
                    </div>
                </div>
                <div id="docStatus" class="status"></div>
            </div>
        </section>

        <!-- AGE CALCULATOR -->
        <section id="age" class="section">
            <div class="card">
                <h2 style="color: var(--primary)"><i class="fa-solid fa-calculator"></i> Age Calculator</h2>
                <div class="grid">
                    <div class="field">
                        <label>Date of Birth</label>
                        <input type="datetime-local" id="dob" value="2000-01-01T09:00">
                    </div>
                    <div class="field">
                        <label>Age at Date</label>
                        <input type="datetime-local" id="targetDate">
                    </div>
                </div>
                <button class="btn" onclick="runAge()">Calculate Age</button>
                <div id="ageRes" style="display:none; margin-top:20px; text-align:center; font-size:1.5rem; color:var(--primary);"></div>
            </div>
        </section>

        <!-- QR/BARCODE GENERATOR -->
        <section id="codes" class="section">
            <div class="card">
                <h2 style="color: var(--secondary)"><i class="fa-solid fa-qrcode"></i> QR & Barcode Generator</h2>
                <div class="grid">
                    <div class="field">
                        <label>Data</label>
                        <input type="text" id="codeData" placeholder="Enter text or URL" oninput="doGen()">
                    </div>
                    <div class="field">
                        <label>Type</label>
                        <select id="codeType" onchange="doGen()">
                            <option value="qr">QR Code (600px HD)</option>
                            <option value="bar">Barcode</option>
                        </select>
                    </div>
                </div>
                <div class="preview-box">
                    <div id="qr-out"></div>
                    <canvas id="bar-out" style="display:none"></canvas>
                </div>
                <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
                    <button class="btn" onclick="dlImg('png')" style="background:#059669">PNG</button>
                    <button class="btn" onclick="dlImg('jpg')" style="background:#d97706">JPG</button>
                    <button class="btn" onclick="dlPdf()" style="background:#dc2626">PDF</button>
                </div>
            </div>
        </section>

        <!-- BANGLA CONVERTER -->
        <section id="bangla" class="section">
            <div class="card">
                <h2 style="color: var(--accent)"><i class="fa-solid fa-language"></i> Bangla Converter</h2>
                <div class="field">
                    <label>Unicode (Avro)</label>
                    <textarea id="unicode-txt" rows="4" placeholder="অভ্রতে লিখুন..."></textarea>
                </div>
                <div style="display:flex; gap:10px; margin:15px 0;">
                    <button class="btn" style="flex:1" onclick="alert('Conversion logic requires external mapping file.')">Avro to Bijoy</button>
                    <button class="btn" style="flex:1" onclick="alert('Conversion logic requires external mapping file.')">Bijoy to Avro</button>
                </div>
                <div class="field">
                    <label>ANSI (Bijoy)</label>
                    <textarea id="ansi-txt" rows="4" placeholder="বিজয় আউটপুট..."></textarea>
                </div>
            </div>
        </section>

    </div>

    <script>
        // Initialize PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const { jsPDF } = window.jspdf;

        // --- Document Logic ---

        function updateStatus(msg) {
            document.getElementById('docStatus').innerText = msg;
        }

        // 1. Word to PDF (Extracts text and formatting via Mammoth)
        async function convertWordToPdf() {
            const file = document.getElementById('wordInput').files[0];
            if (!file) return alert("Select a Word file");
            updateStatus("Processing Word file...");
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const arrayBuffer = e.target.result;
                const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
                const doc = new jsPDF();
                const splitText = doc.splitTextToSize(result.value, 180);
                doc.text(splitText, 10, 10);
                doc.save("converted-word.pdf");
                updateStatus("Word converted to PDF successfully!");
            };
            reader.readAsArrayBuffer(file);
        }

        // 2. PDF to Word (Extracts text and saves as .doc)
        async function convertPdfToWord() {
            const file = document.getElementById('pdfToWordInput').files[0];
            if (!file) return alert("Select a PDF file");
            updateStatus("Extracting text from PDF...");

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    fullText += textContent.items.map(s => s.str).join(" ") + "\n\n";
                }
                
                const blob = new Blob([fullText], { type: "application/msword" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "extracted-pdf-text.doc";
                link.click();
                updateStatus("PDF text extracted to Word (.doc)");
            };
            reader.readAsArrayBuffer(file);
        }

        // 3. Image to PDF
        function convertImgToPdf() {
            const files = document.getElementById('imgToPdfInput').files;
            if (files.length === 0) return alert("Select images");
            updateStatus("Creating PDF...");

            const doc = new jsPDF();
            let processed = 0;

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        if (processed > 0) doc.addPage();
                        const width = doc.internal.pageSize.getWidth();
                        const height = (img.height * width) / img.width;
                        doc.addImage(img, 'JPEG', 0, 0, width, height);
                        processed++;
                        if (processed === files.length) {
                            doc.save("images-combined.pdf");
                            updateStatus("Images converted to PDF!");
                        }
                    }
                };
                reader.readAsDataURL(files[i]);
            }
        }

        // 4. PDF to Image
        async function convertPdfToImg() {
            const file = document.getElementById('pdfToImgInput').files[0];
            if (!file) return alert("Select a PDF");
            updateStatus("Converting PDF pages to Images...");

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                const page = await pdf.getPage(1); // Converts 1st page
                const viewport = page.getViewport({ scale: 2 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                const link = document.createElement('a');
                link.download = "pdf-page-1.jpg";
                link.href = canvas.toDataURL("image/jpeg");
                link.click();
                updateStatus("Page 1 converted to JPG!");
            };
            reader.readAsArrayBuffer(file);
        }

        // --- Existing Logic ---
        document.getElementById('targetDate').value = new Date().toISOString().slice(0, 16);

        function runAge() {
            const dob = new Date(document.getElementById('dob').value);
            const now = new Date(document.getElementById('targetDate').value);
            if(isNaN(dob)) return;
            let y = now.getFullYear() - dob.getFullYear();
            let m = now.getMonth() - dob.getMonth();
            let d = now.getDate() - dob.getDate();
            if (d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }
            const res = document.getElementById('ageRes');
            res.style.display = 'block';
            res.innerText = `${y} Years, ${m} Months, ${d} Days`;
        }

        function doGen() {
            const data = document.getElementById('codeData').value || "ToolHub";
            const type = document.getElementById('codeType').value;
            if(type === 'qr') {
                document.getElementById('qr-out').style.display = 'block';
                document.getElementById('bar-out').style.display = 'none';
                document.getElementById('qr-out').innerHTML = "";
                new QRCode(document.getElementById('qr-out'), { text: data, width: 200, height: 200 });
            } else {
                document.getElementById('qr-out').style.display = 'none';
                document.getElementById('bar-out').style.display = 'block';
                JsBarcode("#bar-out", data, { format: "CODE128", displayValue: true });
            }
        }

        function dlImg(ext) {
            const type = document.getElementById('codeType').value;
            const canvas = type === 'qr' ? document.querySelector('#qr-out canvas') : document.getElementById('bar-out');
            const link = document.createElement('a');
            link.download = `code.${ext}`;
            link.href = canvas.toDataURL(`image/${ext==='jpg'?'jpeg':'png'}`);
            link.click();
        }

        function dlPdf() {
            const doc = new jsPDF();
            const canvas = document.getElementById('codeType').value === 'qr' ? document.querySelector('#qr-out canvas') : document.getElementById('bar-out');
            doc.addImage(canvas.toDataURL(), 'PNG', 15, 30, 100, 100);
            doc.save("export.pdf");
        }

        window.onload = doGen;
    </script>
</body>
</html>
