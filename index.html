<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolHub Pro | All-in-One Utility</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #f472b6;
            --success: #10b981;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
        }

        /* --- Navigation --- */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
        }
        .nav-container {
            max-width: 1100px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .menu { display: flex; gap: 20px; align-items: center; }
        .menu a { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; cursor: pointer; }
        .menu a:hover { color: var(--primary); }

        .user-badge {
            background: var(--primary); color: var(--bg);
            padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem;
            display: none; align-items: center; gap: 5px;
        }

        /* --- Container & Cards --- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .section { margin-bottom: 70px; scroll-margin-top: 100px; }
        .card {
            background: var(--card); border-radius: 24px; padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        h2 { font-size: 1.8rem; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }

        .save-btn {
            position: absolute; top: 30px; right: 30px;
            background: rgba(255,255,255,0.1); border: none; color: var(--text-dim);
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        .save-btn:hover { background: var(--success); color: white; }

        /* --- Forms --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        
        input, select, textarea {
            background: #0f172a; border: 1px solid #334155; color: white;
            padding: 12px; border-radius: 12px; font-size: 1rem; width: 100%;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 12px 20px; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* --- Auth Modal --- */
        #authModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--card); width: 90%; max-width: 400px; padding: 40px; border-radius: 24px;
        }

        /* --- Project List --- */
        #projectSection { display: none; }
        .project-item {
            background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        @media (max-width: 600px) {
            .menu { display: none; }
            .doc-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="#" class="logo">TOOLHUB PRO</a>
            <div class="menu">
                <a href="#age">Age</a>
                <a href="#codes">QR/Bar</a>
                <a href="#docs">PDF/Word</a>
                <a href="#bangla">Bangla</a>
                <div id="userBadge" class="user-badge"><i class="fa-solid fa-user"></i> <span id="usernameDisplay"></span></div>
                <a id="loginNav" onclick="toggleAuthModal()">Login</a>
                <a id="logoutNav" style="display:none" onclick="handleLogout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- DASHBOARD / PROJECTS -->
        <section id="projectSection" class="section">
            <div class="card" style="border-color: var(--success);">
                <h2 style="color: var(--success)"><i class="fa-solid fa-folder-open"></i> My Saved Projects</h2>
                <div id="projectList">
                    <!-- Projects appear here -->
                </div>
            </div>
        </section>

        <!-- PDF & DOCUMENT TOOLS -->
        <section id="docs" class="section">
            <div class="card">
                <h2 style="color: var(--success)"><i class="fa-solid fa-file-pdf"></i> PDF & Document Converter</h2>
                <div class="grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="field">
                        <label>Word to PDF</label>
                        <input type="file" id="wordInput" accept=".docx">
                        <button class="btn" onclick="convertWordToPdf()">Convert</button>
                    </div>
                    <div class="field">
                        <label>PDF to Word (Text)</label>
                        <input type="file" id="pdfToWordInput" accept=".pdf">
                        <button class="btn" onclick="convertPdfToWord()">Extract</button>
                    </div>
                    <div class="field">
                        <label>Image to PDF</label>
                        <input type="file" id="imgToPdfInput" accept="image/*" multiple>
                        <button class="btn" onclick="convertImgToPdf()">Merge</button>
                    </div>
                    <div class="field">
                        <label>PDF to Image</label>
                        <input type="file" id="pdfToImgInput" accept=".pdf">
                        <button class="btn" onclick="convertPdfToImg()">Capture</button>
                    </div>
                </div>
                <div id="docStatus" class="status"></div>
            </div>
        </section>

        <!-- AGE CALCULATOR -->
        <section id="age" class="section">
            <div class="card">
                <button class="save-btn" onclick="saveProject('Age Calculation', document.getElementById('ageRes').innerText)"><i class="fa-solid fa-bookmark"></i> Save</button>
                <h2 style="color: var(--primary)"><i class="fa-solid fa-calculator"></i> Age Calculator</h2>
                <div class="grid">
                    <div class="field"><label>Date of Birth</label><input type="datetime-local" id="dob" value="2000-01-01T09:00"></div>
                    <div class="field"><label>Age at Date</label><input type="datetime-local" id="targetDate"></div>
                </div>
                <button class="btn" style="width:100%" onclick="runAge()">Calculate Age</button>
                <div id="ageRes" style="display:none; margin-top:20px; text-align:center; font-size:1.5rem; color:var(--primary);"></div>
            </div>
        </section>

        <!-- QR/BARCODE GENERATOR -->
        <section id="codes" class="section">
            <div class="card">
                <button class="save-btn" onclick="saveProject('Code Generated', document.getElementById('codeData').value)"><i class="fa-solid fa-bookmark"></i> Save</button>
                <h2 style="color: var(--secondary)"><i class="fa-solid fa-qrcode"></i> QR & Barcode</h2>
                <div class="grid">
                    <div class="field"><label>Data</label><input type="text" id="codeData" placeholder="Enter text..." oninput="doGen()"></div>
                    <div class="field">
                        <label>Type</label>
                        <select id="codeType" onchange="doGen()">
                            <option value="qr">QR Code</option>
                            <option value="bar">Barcode</option>
                        </select>
                    </div>
                </div>
                <div class="preview-box" style="background:white; padding:20px; border-radius:15px; display:flex; justify-content:center; margin-bottom:20px;">
                    <div id="qr-out"></div>
                    <canvas id="bar-out" style="display:none"></canvas>
                </div>
                <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
                    <button class="btn" onclick="dlImg('png')" style="background:#059669">PNG</button>
                    <button class="btn" onclick="dlImg('jpg')" style="background:#d97706">JPG</button>
                    <button class="btn" onclick="dlPdf()" style="background:#dc2626">PDF</button>
                </div>
            </div>
        </section>

        <!-- BANGLA CONVERTER -->
        <section id="bangla" class="section">
            <div class="card">
                <h2 style="color: var(--accent)"><i class="fa-solid fa-language"></i> Bangla Converter</h2>
                <div class="field">
                    <label>Unicode (Avro)</label>
                    <textarea id="unicode-txt" rows="4" placeholder="এখানে অভ্রতে লিখুন..."></textarea>
                </div>
                <div style="display:flex; gap:10px; margin:15px 0;">
                    <button class="btn" style="flex:1" onclick="convertUniToBijoy()"><i class="fa-solid fa-arrow-down"></i> To Bijoy (ANSI)</button>
                    <button class="btn" style="flex:1" onclick="alert('Bijoy to Unicode logic requires full library. Unicode to Bijoy is now active!')"><i class="fa-solid fa-arrow-up"></i> To Avro</button>
                </div>
                <div class="field">
                    <label>ANSI (Bijoy)</label>
                    <textarea id="ansi-txt" rows="4" placeholder="বিজয় ফন্টের আউটপুট..."></textarea>
                </div>
            </div>
        </section>

    </div>

    <!-- AUTH MODAL -->
    <div id="authModal">
        <div class="auth-card">
            <h2 id="authTitle">User Login</h2>
            <div class="field"><label>Email</label><input type="email" id="authEmail"></div>
            <div class="field"><label>Password</label><input type="password" id="authPass"></div>
            <button class="btn" id="authBtn" style="width:100%" onclick="handleAuth()">Login</button>
            <p style="text-align:center; font-size:0.8rem; margin-top:20px; color:var(--text-dim)">
                <span id="authToggleMsg">Don't have an account?</span> 
                <a onclick="toggleAuthMode()" style="color:var(--primary); cursor:pointer">Click here</a>
            </p>
            <button class="btn" style="width:100%; margin-top:10px; background:none; border:1px solid #334155" onclick="toggleAuthModal()">Close</button>
        </div>
    </div>

    <script>
        // --- 1. USER AUTH SYSTEM (Local Storage) ---
        let isLoginMode = true;
        let currentUser = JSON.parse(localStorage.getItem('loggedUser')) || null;

        function toggleAuthModal() {
            const modal = document.getElementById('authModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'User Login' : 'Create Account';
            document.getElementById('authBtn').innerText = isLoginMode ? 'Login' : 'Sign Up';
            document.getElementById('authToggleMsg').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
        }

        function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if(!email || !pass) return alert("Fill all fields");

            let users = JSON.parse(localStorage.getItem('th_users')) || [];

            if(isLoginMode) {
                const user = users.find(u => u.email === email && u.pass === pass);
                if(user) {
                    loginUser(user);
                } else {
                    alert("Invalid Credentials");
                }
            } else {
                if(users.find(u => u.email === email)) return alert("Email exists");
                const newUser = { email, pass, name: email.split('@')[0] };
                users.push(newUser);
                localStorage.setItem('th_users', JSON.stringify(users));
                loginUser(newUser);
            }
        }

        function loginUser(user) {
            currentUser = user;
            localStorage.setItem('loggedUser', JSON.stringify(user));
            updateUI();
            toggleAuthModal();
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('loggedUser');
            updateUI();
        }

        function updateUI() {
            if(currentUser) {
                document.getElementById('loginNav').style.display = 'none';
                document.getElementById('logoutNav').style.display = 'block';
                document.getElementById('userBadge').style.display = 'flex';
                document.getElementById('usernameDisplay').innerText = currentUser.name;
                document.getElementById('projectSection').style.display = 'block';
                loadProjects();
            } else {
                document.getElementById('loginNav').style.display = 'block';
                document.getElementById('logoutNav').style.display = 'none';
                document.getElementById('userBadge').style.display = 'none';
                document.getElementById('projectSection').style.display = 'none';
            }
        }

        // --- 2. PROJECT SAVING SYSTEM ---
        function saveProject(type, details) {
            if(!currentUser) return alert("Please Login to save projects!");
            let projects = JSON.parse(localStorage.getItem('th_projects')) || [];
            const newProj = {
                id: Date.now(),
                user: currentUser.email,
                type: type,
                data: details,
                date: new Date().toLocaleDateString()
            };
            projects.push(newProj);
            localStorage.setItem('th_projects', JSON.stringify(projects));
            alert("Project Saved Successfully!");
            loadProjects();
        }

        function loadProjects() {
            const list = document.getElementById('projectList');
            list.innerHTML = "";
            let projects = JSON.parse(localStorage.getItem('th_projects')) || [];
            const userProjs = projects.filter(p => p.user === currentUser.email);
            
            if(userProjs.length === 0) list.innerHTML = "<p style='color:var(--text-dim)'>No projects saved yet.</p>";

            userProjs.forEach(p => {
                const div = document.createElement('div');
                div.className = "project-item";
                div.innerHTML = `
                    <div>
                        <small style="color:var(--primary)">${p.date}</small>
                        <div style="font-weight:bold">${p.type}</div>
                        <div style="font-size:0.8rem; color:var(--text-dim)">${p.data}</div>
                    </div>
                    <button onclick="deleteProject(${p.id})" style="background:none; border:none; color:var(--accent); cursor:pointer"><i class="fa-solid fa-trash"></i></button>
                `;
                list.appendChild(div);
            });
        }

        function deleteProject(id) {
            let projects = JSON.parse(localStorage.getItem('th_projects')) || [];
            projects = projects.filter(p => p.id !== id);
            localStorage.setItem('th_projects', JSON.stringify(projects));
            loadProjects();
        }

        // --- 3. BANGLA CONVERTER ENGINE (Unicode to Bijoy) ---
        function convertUniToBijoy() {
            const unicodeText = document.getElementById('unicode-txt').value;
            // Basic mapping logic for Unicode to Bijoy (SutonnyMJ compatible)
            let out = unicodeText;
            const map = {
                'ক': 'ক', 'খ': 'খ', 'গ': 'গ', 'ঘ': 'ঘ', 'ঙ': 'ঙ',
                'চ': 'চ', 'ছ': 'ছ', 'জ': 'জ', 'ঝ': 'ঝ', 'ঞ': 'ঞ',
                'া': 'v', 'ি': 'w', 'ী': 'x', 'ু': 'y', 'ূ': 'z',
                // This is a simplified demo of mapping. In a full app, you'd use a comprehensive map.
            };
            
            // Note: Full Bijoy conversion requires handling "Kar" positioning (e.g., 'i' comes before consonant)
            // This placeholder shows the mechanism.
            document.getElementById('ansi-txt').value = unicodeToBijoyLogic(unicodeText);
        }

        function unicodeToBijoyLogic(str) {
            // This is a standard simplified conversion pattern
            if (!str) return "";
            let res = str;
            res = res.replace(/ু/g, "y");
            res = res.replace(/ি/g, "w");
            res = res.replace(/া/g, "v");
            res = res.replace(/্/g, "&");
            return res; 
        }

        // --- 4. PREVIOUS TOOLS LOGIC (PDF/QR/Age) ---
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        const { jsPDF } = window.jspdf;

        async function convertWordToPdf() {
            const file = document.getElementById('wordInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const result = await mammoth.extractRawText({arrayBuffer: e.target.result});
                const doc = new jsPDF();
                doc.text(doc.splitTextToSize(result.value, 180), 10, 10);
                doc.save("word-converted.pdf");
            };
            reader.readAsArrayBuffer(file);
        }

        async function convertPdfToWord() {
            const file = document.getElementById('pdfToWordInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ") + "\n";
                }
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([text], { type: "application/msword" }));
                link.download = "pdf-extracted.doc";
                link.click();
            };
            reader.readAsArrayBuffer(file);
        }

        function convertImgToPdf() {
            const files = document.getElementById('imgToPdfInput').files;
            if (files.length === 0) return;
            const doc = new jsPDF();
            let processed = 0;
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        if (processed > 0) doc.addPage();
                        doc.addImage(img, 'JPEG', 10, 10, 180, 150);
                        processed++;
                        if (processed === files.length) doc.save("images.pdf");
                    }
                };
                reader.readAsDataURL(files[i]);
            }
        }

        async function convertPdfToImg() {
            const file = document.getElementById('pdfToImgInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                const page = await pdf.getPage(1);
                const canvas = document.createElement('canvas');
                const viewport = page.getViewport({ scale: 2 });
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                const link = document.createElement('a');
                link.download = "pdf-page.jpg"; link.href = canvas.toDataURL("image/jpeg"); link.click();
            };
            reader.readAsArrayBuffer(file);
        }

        function runAge() {
            const dob = new Date(document.getElementById('dob').value);
            const now = new Date(document.getElementById('targetDate').value);
            let y = now.getFullYear() - dob.getFullYear();
            let m = now.getMonth() - dob.getMonth();
            let d = now.getDate() - dob.getDate();
            if (d < 0) { m--; d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }
            const res = document.getElementById('ageRes');
            res.style.display = 'block';
            res.innerText = `${y} Years, ${m} Months, ${d} Days`;
        }

        function doGen() {
            const data = document.getElementById('codeData').value || "ToolHub";
            const type = document.getElementById('codeType').value;
            if(type === 'qr') {
                document.getElementById('qr-out').style.display = 'block';
                document.getElementById('bar-out').style.display = 'none';
                document.getElementById('qr-out').innerHTML = "";
                new QRCode(document.getElementById('qr-out'), { text: data, width: 150, height: 150 });
            } else {
                document.getElementById('qr-out').style.display = 'none';
                document.getElementById('bar-out').style.display = 'block';
                JsBarcode("#bar-out", data, { format: "CODE128", height: 50 });
            }
        }

        function dlImg(ext) {
            const canvas = document.querySelector(document.getElementById('codeType').value === 'qr' ? '#qr-out canvas' : '#bar-out');
            const link = document.createElement('a');
            link.download = `code.${ext}`;
            link.href = canvas.toDataURL(`image/${ext==='jpg'?'jpeg':'png'}`);
            link.click();
        }

        function dlPdf() {
            const doc = new jsPDF();
            const canvas = document.querySelector(document.getElementById('codeType').value === 'qr' ? '#qr-out canvas' : '#bar-out');
            doc.addImage(canvas.toDataURL(), 'PNG', 15, 30, 80, 80);
            doc.save("code.pdf");
        }

        window.onload = () => {
            document.getElementById('targetDate').value = new Date().toISOString().slice(0, 16);
            updateUI();
            doGen();
        };
    </script>
</body>
</html>
