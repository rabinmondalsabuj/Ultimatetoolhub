<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolHub Pro | All-in-One Utility</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2a;
            --primary: #0ea5e9;
            --secondary: #6366f1;
            --accent: #f43f5e;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- STICKY NAVBAR --- */
        nav {
            background: rgba(11, 15, 26, 0.95);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 2000;
            border-bottom: 1px solid var(--glass);
        }
        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(to right, #0ea5e9, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        /* --- DESKTOP MENU --- */
        .menu { display: flex; gap: 25px; }
        .menu a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .menu a:hover { color: var(--primary); }

        /* --- MOBILE MENU HAMBURGER --- */
        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 3000;
        }

        /* --- MOBILE OVERLAY --- */
        .mobile-nav {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100vh;
            background: var(--card);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            transition: 0.4s ease-in-out;
            z-index: 2500;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .mobile-nav.active { right: 0; }
        .mobile-nav a {
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }

        /* --- MAIN CONTENT --- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .section { margin-bottom: 60px; scroll-margin-top: 100px; }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--glass);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h2 { font-size: 1.6rem; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        input, select, textarea {
            background: #0f172a;
            border: 1px solid #2d3748;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* QR/Bar Preview */
        .preview-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .dl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-png { background: #10b981; }
        .btn-jpg { background: #f59e0b; }
        .btn-pdf { background: #ef4444; }

        /* Age Results */
        .age-main { font-size: 1.8rem; font-weight: 800; color: var(--primary); text-align: center; margin: 20px 0; }
        .age-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; text-align: center; }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            .menu { display: none; }
            .hamburger { display: block; }
            .dl-grid { grid-template-columns: 1fr; }
            .age-stats { grid-template-columns: repeat(2, 1fr); }
            h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="nav-inner">
            <a href="#" class="logo">TOOLHUB PRO</a>
            
            <!-- Desktop Menu -->
            <div class="menu">
                <a href="#age">Age Calculator</a>
                <a href="#codes">QR/Barcode</a>
                <a href="#bangla">Bangla Converter</a>
            </div>

            <!-- Hamburger Button -->
            <button class="hamburger" onclick="toggleMenu()">
                <i class="fa-solid fa-bars" id="menuIcon"></i>
            </button>
        </div>
    </nav>

    <!-- MOBILE MENU OVERLAY -->
    <div class="mobile-nav" id="mobileNav">
        <a href="#age" onclick="toggleMenu()">Age Calculator</a>
        <a href="#codes" onclick="toggleMenu()">QR/Barcode</a>
        <a href="#bangla" onclick="toggleMenu()">Bangla Converter</a>
    </div>

    <div class="container">

        <!-- AGE CALCULATOR -->
        <section id="age" class="section">
            <div class="card">
                <h2 style="color: var(--primary)"><i class="fa-solid fa-calculator"></i> Age Calculator</h2>
                <div class="grid">
                    <div class="input-box">
                        <label>Date of Birth</label>
                        <input type="datetime-local" id="dob" value="2000-01-01T09:00">
                    </div>
                    <div class="input-box">
                        <label>Calculate At</label>
                        <input type="datetime-local" id="targetDate">
                    </div>
                </div>
                <button class="btn" onclick="runAge()">Calculate Now</button>

                <div id="ageRes" style="display:none">
                    <div class="age-main" id="ageOut">--</div>
                    <div class="age-stats">
                        <div class="stat-card"><div id="sM" style="font-weight:bold">0</div><label>Months</label></div>
                        <div class="stat-card"><div id="sW" style="font-weight:bold">0</div><label>Weeks</label></div>
                        <div class="stat-card"><div id="sD" style="font-weight:bold">0</div><label>Days</label></div>
                        <div class="stat-card"><div id="sS" style="font-weight:bold">0</div><label>Seconds</label></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- QR/BARCODE -->
        <section id="codes" class="section">
            <div class="card">
                <h2 style="color: var(--secondary)"><i class="fa-solid fa-qrcode"></i> QR & Barcode</h2>
                <div class="grid">
                    <div class="input-box">
                        <label>Data</label>
                        <input type="text" id="codeData" placeholder="Enter URL" oninput="doGen()">
                    </div>
                    <div class="input-box">
                        <label>Type</label>
                        <select id="codeType" onchange="doGen()">
                            <option value="qr">QR Code (600px HD)</option>
                            <option value="bar">Barcode</option>
                        </select>
                    </div>
                </div>
                <div class="preview-area">
                    <div id="qr-out"></div>
                    <canvas id="bar-out" style="display:none"></canvas>
                </div>
                <div class="dl-grid">
                    <button class="btn btn-png" onclick="dlImg('png')">PNG</button>
                    <button class="btn btn-jpg" onclick="dlImg('jpg')">JPG</button>
                    <button class="btn btn-pdf" onclick="dlPdf()">PDF</button>
                </div>
            </div>
        </section>

        <!-- BANGLA CONVERTER -->
        <section id="bangla" class="section">
            <div class="card">
                <h2 style="color: var(--accent)"><i class="fa-solid fa-language"></i> Bangla Converter</h2>
                <div class="input-box">
                    <label>Unicode / Avro</label>
                    <textarea id="avroIn" placeholder="Paste Avro here..."></textarea>
                </div>
                <div style="display:flex; gap:10px; margin:15px 0">
                    <button class="btn" style="flex:1" onclick="alert('Avro to Bijoy Active')">To Bijoy</button>
                    <button class="btn" style="flex:1" onclick="alert('Bijoy to Avro Active')">To Avro</button>
                </div>
                <div class="input-box">
                    <label>ANSI / Bijoy</label>
                    <textarea id="bijoyOut" placeholder="Result..."></textarea>
                </div>
            </div>
        </section>

    </div>

    <!-- Hidden HD Canvas -->
    <canvas id="hdCanvas" width="600" height="600" style="display:none"></canvas>

    <script>
        // TOGGLE MOBILE MENU
        function toggleMenu() {
            const nav = document.getElementById('mobileNav');
            const icon = document.getElementById('menuIcon');
            nav.classList.toggle('active');
            
            if(nav.classList.contains('active')) {
                icon.classList.replace('fa-bars', 'fa-times');
            } else {
                icon.classList.replace('fa-times', 'fa-bars');
            }
        }

        // AGE LOGIC
        document.getElementById('targetDate').value = new Date().toISOString().slice(0,16);
        function runAge() {
            const d1 = new Date(document.getElementById('dob').value);
            const d2 = new Date(document.getElementById('targetDate').value);
            if(isNaN(d1)) return;
            let y = d2.getFullYear() - d1.getFullYear();
            let m = d2.getMonth() - d1.getMonth();
            let d = d2.getDate() - d1.getDate();
            if(d<0){ m--; d+= new Date(d2.getFullYear(), d2.getMonth(), 0).getDate(); }
            if(m<0){ y--; m+=12; }
            document.getElementById('ageRes').style.display='block';
            document.getElementById('ageOut').innerText = `${y}Y, ${m}M, ${d}D`;
            const diff = Math.abs(d2-d1);
            document.getElementById('sM').innerText = (y*12+m);
            document.getElementById('sW').innerText = Math.floor(diff/(7*24*3600*1000));
            document.getElementById('sD').innerText = Math.floor(diff/(24*3600*1000));
            document.getElementById('sS').innerText = Math.floor(diff/1000).toLocaleString();
        }

        // GENERATOR LOGIC
        function doGen() {
            const data = document.getElementById('codeData').value || "ToolHub";
            const type = document.getElementById('codeType').value;
            if(type==='qr'){
                document.getElementById('qr-out').style.display='block';
                document.getElementById('bar-out').style.display='none';
                document.getElementById('qr-out').innerHTML="";
                new QRCode(document.getElementById('qr-out'), {text:data, width:180, height:180});
            } else {
                document.getElementById('qr-out').style.display='none';
                document.getElementById('bar-out').style.display='block';
                JsBarcode("#bar-out", data, {height:80});
            }
        }

        // HD DOWNLOAD (600px)
        function dlImg(ext) {
            const type = document.getElementById('codeType').value;
            const data = document.getElementById('codeData').value || "ToolHub";
            if(type==='qr'){
                const hdCanvas = document.getElementById('hdCanvas');
                const ctx = hdCanvas.getContext('2d');
                ctx.fillStyle="white"; ctx.fillRect(0,0,600,600);
                const tempDiv = document.createElement('div');
                new QRCode(tempDiv, {text:data, width:600, height:600});
                setTimeout(()=>{
                    ctx.drawImage(tempDiv.querySelector('canvas'),0,0);
                    const link = document.createElement('a');
                    link.download=`qr-600px.${ext}`;
                    link.href=hdCanvas.toDataURL(`image/${ext==='jpg'?'jpeg':'png'}`);
                    link.click();
                },100);
            } else {
                const link = document.createElement('a');
                link.download=`barcode.${ext}`;
                link.href=document.getElementById('bar-out').toDataURL();
                link.click();
            }
        }

        function dlPdf() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const canvas = document.getElementById('codeType').value === 'qr' ? 
                           document.querySelector('#qr-out canvas') : document.getElementById('bar-out');
            doc.addImage(canvas.toDataURL(), 'PNG', 20, 20, 100, 100);
            doc.save("tool-export.pdf");
        }

        window.onload = doGen;
    </script>
</body>
</html>
